<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>篮球计分板 - 展示面板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Language Toggle -->
  <button class="lang-toggle" id="langToggle" title="切换语言 / Switch Language">中</button>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" title="切换主题 / Switch Theme">
    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <div class="display-wrapper" id="displayWrapper">
    <!-- Main Content -->
    <main class="display-main">
      <!-- Game Clock -->
      <div class="display-clock-section">
        <div class="clock-digit display-clock" id="displayClock">10:00</div>
        <div class="period-label" id="displayPeriodLabel" data-i18n="period_1">第一节</div>
      </div>

      <!-- Teams + Shot Clock Layout -->
      <div class="display-layout">
        <!-- Home Team Card -->
        <div class="display-team-card home-card">
          <div class="display-team-badge" data-i18n="home_badge">主</div>
          <div class="name" id="displayHomeName" data-i18n="home_default">主队</div>
          <div class="score-digit score home-score" id="displayHomeScore">0</div>
          <div class="stats">
            <div class="stat-item">
              <div class="stat-label" data-i18n="foul">犯规</div>
              <div class="stat-value text-foul" id="displayHomeFouls">0</div>
              <div class="bonus-indicator" id="displayHomeBonus" data-i18n="bonus">罚球</div>
            </div>
            <div class="stat-item">
              <div class="stat-label" data-i18n="timeout">暂停</div>
              <div class="stat-value" id="displayHomeTimeouts">2</div>
            </div>
          </div>
        </div>

        <!-- Center: Shot Clock -->
        <div class="display-center-shotclock">
          <div class="period-status">
            <span class="status" id="displayStatus" data-i18n="status_not_started">未开始</span>
          </div>
          <div class="score-digit value" id="displayShotClock">24</div>
          <div class="shot-label" data-i18n="shot_label">进攻</div>
          
          <!-- Official Timeout Display -->
          <div class="display-official-timeout" id="displayOfficialTimeout">
            <div class="display-timeout-label" data-i18n="official_timeout">官方暂停</div>
            <div class="display-timeout-countdown" id="displayOfficialTimeoutCountdown">60</div>
          </div>
        </div>

        <!-- Away Team Card -->
        <div class="display-team-card away-card">
          <div class="display-team-badge" data-i18n="away_badge">客</div>
          <div class="name" id="displayAwayName" data-i18n="away_default">客队</div>
          <div class="score-digit score away-score" id="displayAwayScore">0</div>
          <div class="stats">
            <div class="stat-item">
              <div class="stat-label" data-i18n="foul">犯规</div>
              <div class="stat-value text-foul" id="displayAwayFouls">0</div>
              <div class="bonus-indicator" id="displayAwayBonus" data-i18n="bonus">罚球</div>
            </div>
            <div class="stat-item">
              <div class="stat-label" data-i18n="timeout">暂停</div>
              <div class="stat-value" id="displayAwayTimeouts">2</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    (function() {
      const RULESET_KEY = 'basketball_scoreboard_ruleset';
      const STATE_KEY = 'basketball_scoreboard_state';
      const params = new URLSearchParams(window.location.search);
      const ruleset = params.get('ruleset');
      
      if (ruleset === 'nba' || ruleset === 'fiba') {
        const savedRuleSet = localStorage.getItem(RULESET_KEY);
        
        if (savedRuleSet && savedRuleSet !== ruleset) {
          localStorage.removeItem(STATE_KEY);
        }
        
        localStorage.setItem(RULESET_KEY, ruleset);
      }
    })();
  </script>

  <script>
    const translations = {
      zh: {
        status_not_started: '未开始',
        status_running: '进行中',
        status_paused: '暂停',
        status_finished: '已结束',
        period_1: '第一节',
        period_2: '第二节',
        period_3: '第三节',
        period_4: '第四节',
        period_ot1: '加时1',
        period_ot2: '加时2',
        period_ot3: '加时3',
        period_ot4: '加时4',
        home_badge: '主',
        home_default: '主队',
        away_badge: '客',
        away_default: '客队',
        foul: '犯规',
        bonus: '罚球',
        timeout: '暂停',
        shot_label: '进攻',
        official_timeout: '官方暂停'
      },
      en: {
        status_not_started: 'Not Started',
        status_running: 'Running',
        status_paused: 'Paused',
        status_finished: 'Finished',
        period_1: 'Q1',
        period_2: 'Q2',
        period_3: 'Q3',
        period_4: 'Q4',
        period_ot1: 'OT1',
        period_ot2: 'OT2',
        period_ot3: 'OT3',
        period_ot4: 'OT4',
        home_badge: 'H',
        home_default: 'Home',
        away_badge: 'A',
        away_default: 'Away',
        foul: 'Fouls',
        bonus: 'Bonus',
        timeout: 'TO',
        shot_label: 'SHOT',
        official_timeout: 'OFFICIAL'
      }
    };

    const LANG_KEY = 'basketball_scoreboard_lang';

    function getLang() {
      return localStorage.getItem(LANG_KEY) || 'zh';
    }

    function setLang(lang) {
      localStorage.setItem(LANG_KEY, lang);
      applyTranslations(lang);
      updateLangToggle(lang);
      try {
        const channel = new BroadcastChannel('scoreboard_lang');
        channel.postMessage(lang);
        channel.close();
      } catch (e) {}
    }

    function applyTranslations(lang) {
      const t = translations[lang] || translations.zh;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) {
          el.innerHTML = t[key];
        }
      });
    }

    function updateLangToggle(lang) {
      const btn = document.getElementById('langToggle');
      if (btn) btn.textContent = lang === 'zh' ? 'EN' : '中';
    }

    document.addEventListener('DOMContentLoaded', () => {
      const lang = getLang();
      applyTranslations(lang);
      updateLangToggle(lang);

      const langToggle = document.getElementById('langToggle');
      if (langToggle) {
        langToggle.addEventListener('click', () => {
          const current = getLang();
          setLang(current === 'zh' ? 'en' : 'zh');
        });
      }

      window.addEventListener('storage', (e) => {
        if (e.key === LANG_KEY && e.newValue) {
          applyTranslations(e.newValue);
          updateLangToggle(e.newValue);
        }
      });

      try {
        const channel = new BroadcastChannel('scoreboard_lang');
        channel.onmessage = (event) => {
          applyTranslations(event.data);
          updateLangToggle(event.data);
        };
      } catch (e) {}
    });
  </script>

  <script src="js/gameStore.js"></script>
  <script src="js/display.js"></script>
</body>
</html>
